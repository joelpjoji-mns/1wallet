pluginManagement {
  def reactNativeGradlePlugin = new File(
    providers.exec {
      workingDir(rootDir)
      commandLine("node", "--print", "const fs = require('fs'); const path = require('path'); const reactNativeRoot = fs.realpathSync(path.dirname(require.resolve('react-native/package.json'))); require.resolve('@react-native/gradle-plugin/package.json', { paths: [reactNativeRoot] })")
    }.standardOutput.asText.get().trim()
  ).getParentFile().absolutePath
  includeBuild(reactNativeGradlePlugin)

  def expoPluginsPath = new File(
    providers.exec {
      workingDir(rootDir)
      commandLine("node", "--print", "const fs = require('fs'); const path = require('path'); const expoRoot = fs.realpathSync(path.dirname(require.resolve('expo/package.json'))); require.resolve('expo-modules-autolinking/package.json', { paths: [expoRoot] })")
    }.standardOutput.asText.get().trim(),
    "../android/expo-gradle-plugin"
  ).absolutePath
  includeBuild(expoPluginsPath)
}

plugins {
  id("com.facebook.react.settings")
  id("expo-autolinking-settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
  def reactNativeCliPath = providers.exec {
    workingDir(rootDir)
    commandLine("node", "--print", "const fs = require('fs'); const path = require('path'); const reactNativeRoot = fs.realpathSync(path.dirname(require.resolve('react-native/package.json'))); require.resolve('@react-native-community/cli/build/bin.js', { paths: [reactNativeRoot] })")
  }.standardOutput.asText.get().trim()
  ex.autolinkLibrariesFromCommand(["node", reactNativeCliPath, "config"], new File(rootDir, ".."))
}
expoAutolinking.useExpoModules()

rootProject.name = '1wallet'

expoAutolinking.useExpoVersionCatalog()

include ':app'
include ':expo'
project(':expo').projectDir = new File(rootDir, '../../../node_modules/expo/android')
includeBuild(expoAutolinking.reactNativeGradlePlugin)

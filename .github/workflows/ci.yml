name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - development

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm --config.auto-install-peers=false --config.node-linker=hoisted install --frozen-lockfile

      - name: Typecheck mobile app
        run: pnpm --config.auto-install-peers=false --config.node-linker=hoisted --filter @1wallet/mobile typecheck

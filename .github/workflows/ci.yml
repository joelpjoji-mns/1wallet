name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - development

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: Flutter Analyze, Test, and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env
        run: touch .env

      - name: Analyze
        run: flutter analyze

      - name: Focused regression tests
        run: >-
          flutter test --no-pub
          test/account_color_editor_test.dart
          test/home_account_tile_contrast_test.dart
          test/ledger_persistence_test.dart
          test/theme_accent_test.dart
          test/widget_test.dart

      - name: Build debug APK
        run: flutter build apk --debug --no-pub

name: iOS Release Core

on:
  workflow_call:
    inputs:
      channel:
        description: Update channel to publish
        required: true
        type: string
      release_type:
        description: Release type for update metadata
        required: false
        default: ''
        type: string
      mandatory:
        description: Mark the in-app update as mandatory
        required: false
        default: false
        type: boolean
      submit:
        description: Submit the EAS build to App Store Connect
        required: false
        default: true
        type: boolean
      features:
        description: New feature changelog lines, one per line
        required: false
        default: ''
        type: string
      fixes:
        description: Bug fix changelog lines, one per line
        required: false
        default: ''
        type: string
      notes:
        description: Extra release notes, one per line
        required: false
        default: ''
        type: string
  workflow_dispatch:
    inputs:
      channel:
        description: Update channel to publish
        required: true
        default: beta
        type: choice
        options:
          - beta
          - stable
      release_type:
        description: Release type for update metadata
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      mandatory:
        description: Mark the in-app update as mandatory
        required: true
        default: false
        type: boolean
      submit:
        description: Submit the EAS build to App Store Connect
        required: true
        default: true
        type: boolean
      features:
        description: New feature changelog lines, one per line
        required: false
        type: string
      fixes:
        description: Bug fix changelog lines, one per line
        required: false
        type: string
      notes:
        description: Extra release notes, one per line
        required: false
        type: string

permissions:
  contents: write
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ios-release-${{ github.ref }}-${{ inputs.channel || 'stable' }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish iOS app
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID || 'wallet-1a5af' }}
      UPDATE_CHANNEL: ${{ inputs.channel || 'stable' }}
      EAS_PROFILE: ${{ (inputs.channel || 'stable') == 'beta' && 'preview' || 'production' }}
      RELEASE_TYPE: ${{ inputs.release_type }}
      MANDATORY_UPDATE: ${{ inputs.mandatory }}
      SHOULD_SUBMIT: ${{ inputs.submit }}
      IOS_APP_STORE_URL: ${{ vars.IOS_APP_STORE_URL }}
      IOS_TESTFLIGHT_URL: ${{ vars.IOS_TESTFLIGHT_URL }}
      IOS_BUILD_URL: ${{ vars.IOS_BUILD_URL }}
      IOS_APP_STORE_ID: ${{ vars.IOS_APP_STORE_ID }}
      IOS_BUNDLE_IDENTIFIER: ${{ vars.IOS_BUNDLE_IDENTIFIER || 'com.joelpjoji.one.wallet' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release trigger
        run: |
          if [ "$UPDATE_CHANNEL" = "stable" ] && [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::Stable releases must run from main."
            exit 1
          fi
          if [ "$UPDATE_CHANNEL" = "beta" ] && [ "$GITHUB_REF" = "refs/heads/main" ]; then
            echo "::error::Beta releases must run from development, feature/*, or bug/*, not main."
            exit 1
          fi
          if [ "$UPDATE_CHANNEL" = "beta" ] && [ "$GITHUB_REF" != "refs/heads/development" ] && [[ "$GITHUB_REF_NAME" != feature/* ]] && [[ "$GITHUB_REF_NAME" != bug/* ]]; then
            echo "::error::Beta releases must run from development, feature/*, or bug/*."
            exit 1
          fi
          echo "Publishing $UPDATE_CHANNEL iOS metadata from $GITHUB_REF_NAME."

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm --config.auto-install-peers=false --config.node-linker=hoisted install --frozen-lockfile

      - name: Write mobile environment
        run: |
          {
            echo "EXPO_PUBLIC_FIREBASE_API_KEY=${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}"
            echo "EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}"
            echo "EXPO_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}"
            echo "EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}"
            echo "EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}"
            echo "EXPO_PUBLIC_FIREBASE_APP_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}"
            echo "EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID=${{ secrets.EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID }}"
            echo "EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID=${{ secrets.EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID }}"
            echo "EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID=${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}"
            echo "EXPO_PUBLIC_FIREBASE_USE_EMULATOR=false"
          } > .env.local

      - name: Read release info
        id: info
        run: node scripts/mobile-release-info.mjs --platform ios --channel "$UPDATE_CHANNEL" --output "$GITHUB_OUTPUT"

      - name: Collect release note source
        id: notes_source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ "$UPDATE_CHANNEL" = "beta" ] && [ "$GITHUB_REF" != "refs/heads/development" ]; then
            gh pr list --repo "$GITHUB_REPOSITORY" --head "$GITHUB_REF_NAME" --state open --json number,title,body,url,labels --limit 1 > .tmp-pr.json || echo "[]" > .tmp-pr.json
          else
            gh api -H "Accept: application/vnd.github+json" \
              "/repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/pulls" \
              --jq '[.[] | {number,title,body,url,labels: [.labels[].name]}] | .[0:1]' > .tmp-pr.json || echo "[]" > .tmp-pr.json
          fi
          skip_release="$(node -e "const fs=require('fs'); const pr=(JSON.parse(fs.readFileSync('.tmp-pr.json','utf8'))||[])[0]; const labels=(pr?.labels||[]).map((item)=>String(typeof item==='string'?item:item.name||'').toLowerCase()); process.stdout.write(labels.includes('skip-release')?'true':'false')")"
          echo "skip_release=$skip_release" >> "$GITHUB_OUTPUT"
          if [ "$skip_release" = "true" ]; then
            echo "PR has skip-release label; iOS release publishing will be skipped."
          fi
          previous_tag="$(git describe --tags --match 'ios-*' --abbrev=0 2>/dev/null || true)"
          if [ -n "$previous_tag" ]; then
            git log --pretty=format:'%s' "$previous_tag..HEAD" > .tmp-commits.txt
          else
            git log --pretty=format:'%s' -20 > .tmp-commits.txt
          fi

      - name: Generate release notes
        if: steps.notes_source.outputs.skip_release != 'true'
        env:
          RELEASE_FEATURES: ${{ inputs.features }}
          RELEASE_FIXES: ${{ inputs.fixes }}
          RELEASE_NOTES: ${{ inputs.notes }}
        run: |
          changelog_args=()
          if [ -n "$RELEASE_FEATURES" ]; then
            changelog_args+=(--feature "$RELEASE_FEATURES")
          fi
          if [ -n "$RELEASE_FIXES" ]; then
            changelog_args+=(--fix "$RELEASE_FIXES")
          fi
          if [ -n "$RELEASE_NOTES" ]; then
            changelog_args+=(--note "$RELEASE_NOTES")
          fi
          node scripts/mobile-release-notes.mjs \
            --platform ios \
            --pr-json .tmp-pr.json \
            --commit-log .tmp-commits.txt \
            --version "${{ steps.info.outputs.versionName }}" \
            --version-code "${{ steps.info.outputs.versionCode }}" \
            --require-changelog true \
            "${changelog_args[@]}" \
            --output .tmp-release-notes.json \
            --markdown .tmp-release-notes.md

      - name: Build with EAS
        if: steps.notes_source.outputs.skip_release != 'true'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          submit_args=()
          if [ "$SHOULD_SUBMIT" = "true" ]; then
            submit_args+=(--submit)
          fi
          cd apps/mobile
          node scripts/ios-release.mjs --profile "$EAS_PROFILE" "${submit_args[@]}"

      - name: Publish GitHub release
        if: steps.notes_source.outputs.skip_release != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.info.outputs.tag }}"
          title="${{ steps.info.outputs.releaseTitle }}"
          target="$GITHUB_SHA"
          create_flags=()
          edit_flags=()
          if [ "${{ steps.info.outputs.prerelease }}" = "true" ]; then
            create_flags+=(--prerelease --latest=false)
            edit_flags+=(--prerelease)
          else
            create_flags+=(--latest)
            edit_flags+=(--latest)
          fi
          git tag --force "$tag" "$target"
          git push --force origin "refs/tags/$tag"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if [ "${{ steps.info.outputs.prerelease }}" = "true" ]; then
              echo "::error::Beta release $tag already exists. Bump the development beta patch version before publishing again."
              exit 1
            fi
            gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --target "$target" --title "$title" --notes-file .tmp-release-notes.md "${edit_flags[@]}"
          else
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --target "$target" --title "$title" --notes-file .tmp-release-notes.md "${create_flags[@]}"
          fi

      - name: Generate update manifest
        if: steps.notes_source.outputs.skip_release != 'true'
        run: |
          mandatory_args=()
          if [ "$MANDATORY_UPDATE" = "true" ]; then
            mandatory_args=(--mandatory true)
          fi
          release_type_args=()
          if [ -n "$RELEASE_TYPE" ]; then
            release_type_args=(--release-type "$RELEASE_TYPE")
          fi
          store_args=()
          if [ -n "$IOS_APP_STORE_URL" ]; then
            store_args+=(--app-store-url "$IOS_APP_STORE_URL")
          fi
          if [ -n "$IOS_TESTFLIGHT_URL" ]; then
            store_args+=(--testflight-url "$IOS_TESTFLIGHT_URL")
          fi
          if [ -n "$IOS_BUILD_URL" ]; then
            store_args+=(--build-url "$IOS_BUILD_URL")
          fi
          if [ -n "$IOS_APP_STORE_ID" ]; then
            store_args+=(--app-store-id "$IOS_APP_STORE_ID")
          fi
          if [ -z "$IOS_APP_STORE_URL" ] && [ -z "$IOS_TESTFLIGHT_URL" ] && [ -z "$IOS_BUILD_URL" ]; then
            echo "::error::Set IOS_APP_STORE_URL, IOS_TESTFLIGHT_URL, or IOS_BUILD_URL repository variable before publishing iOS metadata."
            exit 1
          fi
          pnpm --config.auto-install-peers=false --config.node-linker=hoisted run mobile:update:manifest -- \
            --platform ios \
            --version "${{ steps.info.outputs.versionName }}" \
            --version-code "${{ steps.info.outputs.versionCode }}" \
            --channel "$UPDATE_CHANNEL" \
            --bundle-identifier "$IOS_BUNDLE_IDENTIFIER" \
            --minimum-os-version "15.1" \
            "${store_args[@]}" \
            "${release_type_args[@]}" \
            --changelog-json .tmp-release-notes.json \
            "${mandatory_args[@]}" \
            --output "importdata/mobile-update-${{ steps.info.outputs.versionName }}-${{ steps.info.outputs.channel }}-ios.json"

      - name: Publish update metadata to Firestore
        if: steps.notes_source.outputs.skip_release != 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          pnpm --config.auto-install-peers=false --config.node-linker=hoisted run mobile:update:publish -- \
            --project "$FIREBASE_PROJECT_ID" \
            --skip-upload \
            --manifest "importdata/mobile-update-${{ steps.info.outputs.versionName }}-${{ steps.info.outputs.channel }}-ios.json"

      - name: Upload manifest to release
        if: steps.notes_source.outputs.skip_release != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.info.outputs.tag }}"
          manifest="importdata/mobile-update-${{ steps.info.outputs.versionName }}-${{ steps.info.outputs.channel }}-ios.json"
          gh release upload "$tag" "$manifest" --repo "$GITHUB_REPOSITORY" --clobber

      - name: Upload workflow artifacts
        if: steps.notes_source.outputs.skip_release != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: 1wallet-ios-${{ steps.info.outputs.versionName }}-${{ steps.info.outputs.channel }}-${{ steps.info.outputs.versionCode }}
          path: |
            importdata/mobile-update-${{ steps.info.outputs.versionName }}-${{ steps.info.outputs.channel }}-ios.json
            .tmp-release-notes.md

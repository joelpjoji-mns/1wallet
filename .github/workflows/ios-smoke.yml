name: iOS Smoke Build

on:
  pull_request:
    branches:
      - development
      - main
    paths:
      - '.github/workflows/ios-smoke.yml'
      - 'apps/mobile/**'
      - 'packages/**'
      - 'patches/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - 'turbo.json'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ios-smoke:
    name: Prebuild and compile iOS simulator
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm --config.auto-install-peers=false --config.node-linker=hoisted install --frozen-lockfile

      - name: Validate iOS JavaScript bundle
        working-directory: apps/mobile
        run: pnpm --config.auto-install-peers=false --config.node-linker=hoisted exec expo export --platform ios --output-dir .tmp-ios-export

      - name: Prebuild iOS project
        working-directory: apps/mobile
        run: pnpm --config.auto-install-peers=false --config.node-linker=hoisted exec expo prebuild --platform ios

      - name: Build iOS simulator app
        working-directory: apps/mobile/ios
        run: |
          workspace="$(find . -maxdepth 1 -name '*.xcworkspace' -print -quit)"
          if [ -z "$workspace" ]; then
            echo "::error::No Xcode workspace generated by Expo prebuild."
            exit 1
          fi
          scheme="$(xcodebuild -list -json -workspace "$workspace" | node -e "let input=''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => { const data = JSON.parse(input); const scheme = data.workspace?.schemes?.[0]; if (!scheme) process.exit(1); process.stdout.write(scheme); });")"
          xcodebuild \
            -workspace "$workspace" \
            -scheme "$scheme" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

name: iOS Stable Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    name: Publish stable iOS build
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    uses: ./.github/workflows/ios-release.yml
    with:
      channel: stable
      mandatory: false
      submit: true
    secrets: inherit

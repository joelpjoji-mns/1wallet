name: iOS Beta Release

on:
  push:
    branches:
      - development

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    name: Publish beta iOS build
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    uses: ./.github/workflows/ios-release.yml
    with:
      channel: beta
      mandatory: false
      submit: true
    secrets: inherit

name: Android Stable Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    name: Publish stable APK
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    uses: ./.github/workflows/android-release.yml
    with:
      channel: stable
      mandatory: false
      publish_assets_repo: false
    secrets: inherit
